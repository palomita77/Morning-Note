name: Morning Note

on:
  schedule:
    # Target: 03:00 EST scheduled; GitHub Actions delays ~5 hrs, delivering ~08:00 EST
    # EST (Nov–Mar): UTC-5  ->  08:00 UTC = 03:00 EST scheduled
    # EDT (Mar–Nov): UTC-4  ->  08:00 UTC = 04:00 EDT scheduled
    - cron: "0 8 * * 1-5"    # Weekdays only; trading calendar check handles holidays
  workflow_dispatch:           # Allows manual trigger from GitHub Actions UI for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-morning-note:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning note
        env:
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          python src/morning_note.py 2>&1
